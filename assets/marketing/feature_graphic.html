<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024">
<title>Kusuridoki Feature Graphic</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@400;500;600;700;800&display=swap');

  body {
    width: 1024px;
    height: 500px;
    overflow: hidden;
    font-family: 'Inter', 'Noto Sans JP', sans-serif;
  }

  .canvas {
    width: 1024px;
    height: 500px;
    background: linear-gradient(135deg, #0A1E1C 0%, #0D2825 35%, #0F312D 65%, #0D968B 160%);
    position: relative;
    display: flex;
    align-items: center;
    overflow: hidden;
  }

  .bg-glow {
    position: absolute;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.12;
  }
  .bg-glow-1 { width: 500px; height: 500px; background: #14EBD9; top: -150px; right: 50px; }
  .bg-glow-2 { width: 350px; height: 350px; background: #0D968B; bottom: -100px; left: 150px; }

  .grid-overlay {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  /* Left content */
  .content-left {
    position: relative;
    z-index: 2;
    padding-left: 60px;
    width: 540px;
    flex-shrink: 0;
  }

  .app-icon {
    width: 60px;
    height: 60px;
    border-radius: 15px;
    background: linear-gradient(135deg, #0D968B, #14EBD9);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 18px;
    box-shadow: 0 4px 24px rgba(13, 150, 139, 0.5);
  }
  .app-icon svg { width: 34px; height: 34px; }

  .app-name-ja {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 46px;
    font-weight: 900;
    color: #FFFFFF;
    letter-spacing: 3px;
    line-height: 1.15;
  }
  .app-name-en {
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: #14EBD9;
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-top: 4px;
    margin-bottom: 22px;
  }

  .tagline {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 17px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.75);
    line-height: 1.7;
    margin-bottom: 26px;
  }
  .tagline-en {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.5);
    margin-top: 4px;
  }

  .features {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .feature-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 13px;
    background: rgba(20, 235, 217, 0.08);
    border: 1px solid rgba(20, 235, 217, 0.2);
    border-radius: 20px;
    font-size: 11.5px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.8);
    font-family: 'Noto Sans JP', sans-serif;
  }
  .feature-chip .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #14EBD9;
    flex-shrink: 0;
  }

  /* Right: Screenshot as-is */
  .screenshot-area {
    position: relative;
    z-index: 2;
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .screenshot-area img {
    height: 460px;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    display: block;
  }
</style>
</head>
