name: my_pill
description: "Kusuridoki - Your reliable medication companion"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # State Management (Riverpod 3.x for Dart 3.10)
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  # Routing
  go_router: ^17.0.1
  # Local Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  # Firebase
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  cloud_functions: ^6.0.6
  firebase_messaging: ^16.1.1
  # Deep Linking (replaces dead firebase_dynamic_links)
  app_links: ^7.0.0
  # Notifications
  flutter_local_notifications: ^20.1.0
  # UI
  google_fonts: ^8.0.2
  fl_chart: ^1.1.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.1.4
  image_picker: ^1.2.1
  # Ads
  google_mobile_ads: ^7.0.0
  google_sign_in: ^7.2.0
  # IAP
  in_app_purchase: ^3.2.3
  # Home Screen Widgets
  home_widget: ^0.9.0
  # Utilities
  intl: ^0.20.2
  timezone: ^0.10.1
  uuid: ^4.5.2
  share_plus: ^12.0.1
  url_launcher: ^6.3.2
  path_provider: ^2.1.5
  json_annotation: ^4.9.0
  freezed_annotation: ^3.1.0
  collection: ^1.19.1
  # Security
  flutter_secure_storage: ^9.2.4
  # PDF Generation
  pdf: ^3.11.3
  printing: ^5.14.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.10.5
  json_serializable: ^6.13.0
  freezed: ^3.2.3
  riverpod: ^3.1.0
  riverpod_generator: ^4.0.0
  mockito: ^5.6.3
  firebase_core_platform_interface: ^6.0.2
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFF5F0"
  adaptive_icon_foreground: "assets/images/kusuridoki.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
